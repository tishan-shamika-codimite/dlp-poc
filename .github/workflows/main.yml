name: Verify WiX v5 Extension

on:
  workflow_dispatch:

jobs:
  verify-wix-setup:
    name: Test WiX v5.0.2 Installation
    runs-on: windows-latest

    steps:
      - name: Setup .NET Core SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install WiX CLI (v5.0.2) & Verify Extensions
        shell: pwsh
        run: |
          # 1. Install the base WiX tool
          dotnet tool install --global wix --version 5.0.2
          echo "$HOME\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          
          # Force the current shell block to look at the newly added path
          $env:PATH = "$HOME\.dotnet\tools;" + $env:PATH
          
          # 2. Add the extension GLOBALLY (-g) so your build scripts can see it
          wix extension add -g WixToolset.Util.wixext/5.0.2
          
          # 3. VERIFICATION: List the extensions to print the confirmation in GitHub logs
          Write-Host "════════════════════════════════════════════════" -ForegroundColor Cyan
          Write-Host "   VERIFYING WIX EXTENSIONS IN GITHUB RUNNER     " -ForegroundColor Cyan
          Write-Host "════════════════════════════════════════════════" -ForegroundColor Cyan
          wix extension list -g
